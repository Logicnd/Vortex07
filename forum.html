<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vortex07 community forum — post and read threads.">
  <title>Forum — Vortex07</title>
  <link rel="stylesheet" href="css/main.css">
  <script>(function(){var t=localStorage.getItem('v07-theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

  <nav class="site-nav" aria-label="Main">
    <a href="index.html" class="nav__logo">Vortex07</a>
    <ul class="nav__links">
      <li><a href="index.html" class="nav__link">Home</a></li>
      <li><a href="install.html" class="nav__link">Install</a></li>
      <li><a href="forum.html" class="nav__link active" aria-current="page">Forum</a></li>
      <li><a href="features.html" class="nav__link">Features</a></li>
      <li><a href="https://github.com/Logicnd/Vortex07" class="nav__link" target="_blank" rel="noopener noreferrer">GitHub</a></li>
    </ul>
    <button type="button" class="theme-toggle" aria-label="Toggle theme">Auto</button>
  </nav>

  <main class="wrap">
    <div class="page-body">
      <p class="lead">Same posts as the extension forum tab.</p>

      <div class="forum-layout">
        <form id="forum-form" class="forum-form panel" aria-label="Create forum post">
          <label for="forum-title">Title</label>
          <input type="text" id="forum-title" name="title" maxlength="120" required placeholder="Subject">

          <label for="forum-name">Name</label>
          <input type="text" id="forum-name" name="name" maxlength="32" placeholder="Optional">

          <label for="forum-message">Message</label>
          <textarea id="forum-message" name="message" maxlength="4000" required placeholder="Your post…"></textarea>

          <button type="submit" class="btn btn--primary">Post</button>
          <p id="forum-status" class="forum-status" aria-live="polite"></p>
        </form>

        <div>
          <h2 class="section-title">Posts</h2>
          <div id="forum-list" class="panel panel--grow" aria-live="polite">
            <p class="forum-empty">Loading…</p>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <span>Made by <a href="https://github.com/Logicnd" target="_blank" rel="noopener noreferrer">Logicnd</a></span>
      <span><a href="privacy.html">Privacy</a><a href="index.html">Home</a></span>
    </footer>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/forum.js"></script>
</body>
</html>
